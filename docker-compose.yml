services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-documents}
      EMBEDDER_PROVIDER: ${EMBEDDER_PROVIDER:-hash}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      GENERATOR_PROVIDER: ${GENERATOR_PROVIDER:-simple}
      GENERATOR_MODEL_NAME: ${GENERATOR_MODEL_NAME:-google/flan-t5-small}
      EXTERNAL_EMBEDDING_API_KEY: ${EXTERNAL_EMBEDDING_API_KEY:-}
      EXTERNAL_EMBEDDING_BASE_URL: ${EXTERNAL_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EXTERNAL_GENERATOR_API_KEY: ${EXTERNAL_GENERATOR_API_KEY:-}
      EXTERNAL_GENERATOR_BASE_URL: ${EXTERNAL_GENERATOR_BASE_URL:-https://api.openai.com/v1}
      LOCAL_MODEL_ENDPOINT: ${LOCAL_MODEL_ENDPOINT:-}
    ports:
      - "${APP_EXTERNAL_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      chroma:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL:-http://app:8000/api}
    command: >
      /bin/sh -c "python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8001"
    ports:
      - "${WEB_EXTERNAL_PORT:-8010}:8001"
    depends_on:
      app:
        condition: service_started
    volumes:
      - .:/app

  chroma:
    image: chromadb/chroma:0.5.5
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "${CHROMA_EXTERNAL_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  model:
    image: ollama/ollama:latest
    profiles: ["local-model"]
    ports:
      - "${LOCAL_MODEL_EXTERNAL_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  chroma_data:
  ollama_data:
